<meta charset="UTF-8">

<style>

body{
background:#121212;
color:white;
font-family:Segoe UI;
margin:0;
padding-top:140px;
text-align:center;
}

.header{
position:fixed;
top:0;
width:100%;
background:#1e1e1e;
border-bottom:2px solid #00ffcc;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
z-index:1000;
}

.contador{
font-size:22px;
color:#00ffcc;
font-weight:bold;
}

.search{
margin-top:10px;
padding:8px;
width:220px;
border-radius:6px;
border:none;
background:#333;
color:white;
}

.btn-reset{
margin-left:10px;
padding:8px 12px;
border:none;
background:#ff4444;
color:white;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
gap:15px;
padding:20px;
}

.poke{
background:#252525;
border:2px solid #444;
border-radius:12px;
padding:10px;
cursor:pointer;
transition:.2s;
display:flex;
flex-direction:column;
align-items:center;
}

.poke img{
width:72px;
height:72px;
image-rendering:pixelated;
filter:grayscale(1) opacity(.35);
}

.name{
font-size:11px;
margin-top:6px;
color:#888;
}

.poke.active{
border-color:#00ffcc;
background:#333;
}

.poke.active img{
filter:none;
transform:scale(1.1);
}

.poke.active .name{
color:#00ffcc;
font-weight:bold;
}

</style>

const total = 1025
const grid = document.getElementById("grid")
const num = document.getElementById("num")
const search = document.getElementById("search")

let data = JSON.parse(localStorage.getItem("dex")) || {}
let count = Object.values(data).filter(v=>v).length

num.textContent = count

function create(){

const frag = document.createDocumentFragment()

for(let i=1;i<=total;i++){

const div = document.createElement("div")

div.className="poke"+(data[i]?" active":"")

div.dataset.id=i

div.dataset.name = (nombres[i-1] || "").toLowerCase()

div.innerHTML=`

<img loading="lazy"
src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${i}.png">

<div class="name">#${i} ${nombres[i-1]}</div>

`

div.onclick=()=>{

const active = div.classList.toggle("active")

data[i]=active

if(active) count++
else count--

num.textContent=count

localStorage.setItem("dex",JSON.stringify(data))

}

frag.appendChild(div)

}

grid.appendChild(frag)

}

function reset(){

if(confirm("Borrar progreso?")){

localStorage.removeItem("dex")

data={}
count=0
num.textContent=0

document.querySelectorAll(".poke").forEach(p=>p.classList.remove("active"))

}

}

search.addEventListener("input",()=>{

const t = search.value.toLowerCase()

document.querySelectorAll(".poke").forEach(p=>{

const name = p.dataset.name

const id = p.dataset.id

if(id.includes(t) || name.includes(t)){
p.style.display="flex"
}else{
p.style.display="none"
}

})

})

create()
